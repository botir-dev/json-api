# docker-compose.yml
version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: enterprise_api
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-enterprise_db}
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - enterprise_net

  postgres:
    image: postgres:16-alpine
    container_name: enterprise_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:       ${POSTGRES_DB:-enterprise_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout:  5s
      retries:  5
    networks:
      - enterprise_net

  redis:
    image: redis:7-alpine
    container_name: enterprise_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test:     ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout:  3s
      retries:  5
    networks:
      - enterprise_net

  # Optional: Adminer for DB management
  adminer:
    image: adminer
    container_name: enterprise_adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      - postgres
    networks:
      - enterprise_net
    profiles:
      - dev

  # Optional: Redis Commander for cache inspection
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: enterprise_redis_ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - '8081:8081'
    depends_on:
      - redis
    networks:
      - enterprise_net
    profiles:
      - dev

volumes:
  postgres_data:
  redis_data:

networks:
  enterprise_net:
    driver: bridge
